spring.application.name=springtimes

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/springtimes}
spring.datasource.username=${DB_USERNAME:springtimes}
spring.datasource.password=${DB_PASSWORD:springtimes}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-seconds=${JWT_EXPIRY_SECONDS:86400}

app.auth.username=${APP_USERNAME}
app.auth.password=${APP_PASSWORD}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
